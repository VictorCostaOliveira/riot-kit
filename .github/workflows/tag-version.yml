# After every push to main: read lib/riot_kit/version.rb and create tag vX.Y.Z if it does not exist yet.
# Release RubyGem runs on that tag (tests + gem push).

name: Tag release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: riot-kit-tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read gem version and push tag if new
        run: |
          set -euo pipefail
          VERSION="$(ruby -e "load 'lib/riot_kit/version.rb'; puts RiotKit::VERSION")"
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin --tags

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — nothing to do."
            exit 0
          fi

          git tag -a "${TAG}" -m "Release ${VERSION}"

          if git push origin "${TAG}"; then
            echo "Pushed ${TAG}"
          else
            git fetch origin --tags
            if git rev-parse "${TAG}" >/dev/null 2>&1; then
              echo "Tag ${TAG} appeared after push — OK."
              exit 0
            fi
            exit 1
          fi
